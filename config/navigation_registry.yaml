        permission_key: "approve_maker_checker"
        sap_modules: ["Governance"]
      - page: "pages/nlp_document_intelligence.py"
        label: "🧠 NLP Doc Intelligence"
        sap_modules: ["Governance"]

  - id: reporting
    label: Reporting & Governance
    items:
      - page: "pages/audit_report_center.py"
        label: "📑 Audit Report Center & MIS"
        sap_modules: ["Governance"]
      - page: "pages/audit_committee_pack.py"
        label: "🏛️ Audit Committee Pack"
        sap_modules: ["Governance"]
      - page: "pages/audit_kpi_dashboard.py"
        label: "📊 Audit KPI Dashboard"
        sap_modules: ["Governance"]
      - page: "pages/unified_dashboard.py"
        label: "📈 Unified Anomaly Dashboard"
        sap_modules: ["FI", "MM", "SD"]
      - page: "pages/multi_company_dashboard.py"
        label: "🏢 Multi-Company Dashboard"
        sap_modules: ["Governance"]
      - page: "pages/policy_management.py"
        label: "🗄️ Policy Management"
        permission_key: "manage_policies"
        sap_modules: ["Governance"]

