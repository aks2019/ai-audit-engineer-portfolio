        module_id: "payroll_audit"
        sap_modules: ["HR"]
      - page: "pages/sales_revenue_auditor.py"
        label: "📈 Sales Revenue Auditor"
        module_id: "sales_revenue_auditor"
        sap_modules: ["SD"]
      - page: "pages/itgc_sap_access_auditor.py"
        label: "🔐 ITGC & SAP Access"
        sap_modules: ["Basis", "Security"]
      - page: "pages/sap_data_pack_auditor.py"
        label: "📦 SAP Data Pack Auditor"
        sap_modules: ["SAP"]
      - page: "pages/contract_management_auditor.py"
        label: "📜 Contract Management"
        module_id: "contract_management"
        sap_modules: ["MM", "SD"]

  - id: review
