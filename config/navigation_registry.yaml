        sap_modules: ["FI"]
      - page: "pages/gst_tds_compliance.py"
        label: "🧾 GST/TDS Compliance"
        sap_modules: ["FI"]
      - page: "pages/related_party_monitor.py"
        label: "🔗 Related-Party Monitor"
        sap_modules: ["FI"]
      - page: "pages/duplicate_invoice_detector.py"
        label: "🎭 Duplicate Invoice Detector"
        sap_modules: ["FI", "MM"]
      - page: "pages/inventory_anomaly.py"
        label: "📦 Inventory Anomaly"
        module_id: "inventory_anomaly"
