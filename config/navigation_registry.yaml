      - page: "pages/fixed_asset_auditor.py"
        label: "🏭 Fixed Asset Auditor"
        sap_modules: ["FI"]
      - page: "pages/expense_claim_auditor.py"
        label: "✈️ Expense Claim Auditor"
        sap_modules: ["FI", "HR"]
      - page: "pages/payroll_audit.py"
