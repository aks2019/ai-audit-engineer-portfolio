        sap_modules: ["Governance"]
      - page: "pages/dynamic_audit_builder.py"
        label: "🛠️ Dynamic Audit Builder"
        sap_modules: ["Governance"]
      - page: "pages/audit_planning_engine.py"
        label: "📅 Annual Audit Planning Engine"
        sap_modules: ["Governance"]
      - page: "pages/risk_register.py"
        label: "⚠️ Risk Register & Priority Mapping"
        sap_modules: ["Governance"]
